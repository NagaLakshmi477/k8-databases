apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: roboshop
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  clusterIP: None
  selector:
    component: mongodb
    project: roboshop
    tier: database
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  serviceName: "mongodb-headless"
  replicas: 3

  selector:
    matchLabels:
      component: mongodb
      project: roboshop
      tier: database

  template:
    metadata:
      labels:
        component: mongodb
        project: roboshop
        tier: database

    spec:
      containers:
        - name: mongodb
          image: lakshmi1092/mongodb:v1
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: roboshop-ebs
        resources:
          requests:
            storage: 2Gi