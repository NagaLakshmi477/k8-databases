apiVersion: v1 
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
  labels:
        component: redis
        project: roboshop
        tier: database
spec:
  clusterIp: None
  selector:
      component: redis
      project: roboshop
      tier: database
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379

---
apiVersion: v1 
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
        component: redis
        project: roboshop
        tier: database
spec:
  selector:
      component: redis
      project: roboshop
      tier: database
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
--- 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      component: redis
      project: roboshop
      tier: database
  template:
    metadata:
      labels:
        component: redis
        project: roboshop
        tier: database
    spec:
      containers:
      - name: redis
        image: redis:7.0
---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis
  labels:
    component: redis
    project: roboshop
    tier: database
spec:
  serviceName: "redis-headless"
  replicas: 2

  selector:
    matchLabels:
      component: redis
      project: roboshop
      tier: database

  template:
    metadata:
      labels:
        component: redis
        project: roboshop
        tier: database

    spec:
      containers:
        - name: redis
          image: redis:7.0
          volumeMounts:
            - name: redis-data
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: roboshop-ebs
        resources:
          requests:
            storage: 2Gi